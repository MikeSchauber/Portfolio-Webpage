<div class="effect-container">
    <div class="projects-cont">

        @for (project of projectList; track $index; let i = $index) {
        @if (project.active) {
        <div (mouseover)="hoverProject(i)" (mouseleave)="leaveProject()" (click)="openDialog(project.dataName, i)"
            class="project">
            <div class="name-container">
                <h3>{{project.name}}</h3>
                <img [ngClass]="{'opacity': this.showArrowArray[i]}" src="assets/icons/arrow-outward-white.png" alt="">
            </div>
            <div class="tech-container">
                @for (techIndex of project.technologies; track $index; let i =
                $index) {
                <span>{{projectDataService.technologiesArray[techIndex]}}</span>
                }
            </div>
        </div>
        }
        }

    </div>
    <div [ngClass]="{
    'background-animation' : this.imgAnimation
}" class="img-container">
        @if (imgSrcWhenHover.endsWith('.mp4')) {
        <video [ngClass]="{
            'img-animation' : this.imgAnimation
        }" [src]="imgSrcWhenHover" autoplay muted loop playsinline></video>
        } @else {
        <img [ngClass]="{
            'img-animation' : this.imgAnimation
        }" [src]="imgSrcWhenHover" alt="Project-Image">
        }
    </div>
</div>
